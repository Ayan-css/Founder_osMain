name: right_craft_media_os
description: "Right Craft Media OS - Complete Content Agency Operating System"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Backend
  supabase_flutter: ^2.8.4

  # Charts
  fl_chart: ^0.70.2

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utilities
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  intl: any
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.1
  table_calendar: ^3.1.3
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # Export
  csv: ^6.0.0
  pdf: ^3.11.2
  printing: ^5.13.5

  # Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  timezone: ^0.10.1
  home_widget: ^0.9.3
  image_picker: ^1.2.2
  timeago: ^3.7.1
  add_2_calendar: ^3.1.1

  app_links: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon/app_icon.png"

flutter:
  uses-material-design: true



  assets:
    - assets/images/
    - assets/icons/
    - .env
